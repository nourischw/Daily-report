name: Scrape Daily Report

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/scrape-and-commit.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get current date
        id: date
        run: echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create reports directory
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          mkdir -p reports/$YEAR/$MONTH

      - name: Run report generator
        run: node scripts/generate-reports.mjs

      - name: Check for changes
        id: changed-files
        run: |
          git status --porcelain > changed.txt
          if [ -s changed.txt ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          fi
          cat changed.txt

      - name: Commit and push
        if: steps.changed-files.outputs.HAS_CHANGES == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          TODAY=$(date +%Y-%m-%d)
          git add reports/$YEAR/$MONTH/$TODAY/
          git status
          
          git commit -m "Auto-update reports: $TODAY"
          git push
          echo "Reports pushed successfully"
